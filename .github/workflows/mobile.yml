name: Mobile App CI

on:
  push:
    paths:
      - 'aethos-mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'aethos-mobile/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: aethos-mobile/package.json
      - name: Install dependencies
        working-directory: aethos-mobile
        run: npm install
      - name: Typecheck
        working-directory: aethos-mobile
        run: npm run typecheck
