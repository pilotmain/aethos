name: Python CI

# Phase 73d — provides remote CI signal that the self-improvement CI monitor
# can wait on. Scoped to PRs that touch backend / tests / web / config so we
# don't run on changes that can't possibly affect Python or the web app.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'tests/**'
      - 'web/**'
      - 'requirements.txt'
      - '.github/workflows/python-ci.yml'
      - '.env.example'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'tests/**'
      - 'web/**'
      - 'requirements.txt'

# Cancel in-progress runs on the same ref to keep the queue small — a fresh
# self-improvement push always invalidates older runs.
concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: compileall + 73-family pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what the 73-family tests need. The full requirements
          # set drags in heavyweight optional ML libs we don't need for CI;
          # if a future test fails for ImportError we'll widen this.
          pip install -r requirements.txt

      - name: compileall app/
        run: python -m compileall -q app

      - name: 73-family pytest subset
        env:
          # Keep tests deterministic: no real LLM calls, no real network.
          USE_REAL_LLM: 'false'
          NEXA_PRODUCTION_MODE: 'false'
        run: |
          python -m pytest -q \
            tests/test_self_improvement_phase73b.py \
            tests/test_self_improvement_github_phase73c.py \
            tests/test_self_improvement_ci_phase73d.py \
            tests/test_self_healing_phase73.py \
            tests/test_self_healing_wrap_up_phase73_5.py

  web:
    name: web tsc
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund
      - name: tsc --noEmit
        working-directory: web
        run: npx tsc --noEmit
