# Nexa: Postgres + API (scheduler/operator) + Telegram bot
# Copy env.docker.example -> .env and set secrets (at least TELEGRAM_BOT_TOKEN for the bot).
#
#   docker compose up --build
# API: http://localhost:8010  (host → container 8000)  Docs: /docs
#
# SQLite-only (no Postgres): use docker-compose.sqlite.yml (see README Docker section)

name: nexa

services:
  db:
    container_name: nexa-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: overwhelm
      POSTGRES_PASSWORD: overwhelm
      POSTGRES_DB: overwhelm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overwhelm -d overwhelm"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Host port defaults to 5433 so a local PostgreSQL on 5432 does not block `compose up`.
    # Override in .env: POSTGRES_HOST_PORT=5432
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

  api:
    container_name: nexa-api
    build:
      context: .
      dockerfile: Dockerfile
    image: nexa:local
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8010:8000"
    environment:
      # Always use the compose Postgres (overrides DATABASE_URL in .env if you still have sqlite there)
      DATABASE_URL: postgresql+psycopg2://overwhelm:overwhelm@db:5432/overwhelm
      # Bot / browser links; host machine reaches API on localhost:8010 (container listens on 8000)
      API_BASE_URL: http://localhost:8010
      # Operator CLI probes: Dockerfile installs these; override Mac paths from .env inside Linux containers.
      NEXA_OPERATOR_CLI_VERCEL_ABS: /usr/bin/vercel
      NEXA_OPERATOR_CLI_GH_ABS: /usr/bin/gh
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Bind mount so `dev_job_*.md` / `*.done.md` edited on the host (Cursor) match paths the API/bot use.
    volumes:
      - ./.agent_tasks:/app/.agent_tasks
      - runtime_data:/app/.runtime
      # Host executor: local git repos on this Mac (matches HOST_EXECUTOR_WORK_ROOT=/Users/raya in .env).
      - /Users/raya:/Users/raya
      # Persist `vercel login` / `gh auth login` across container recreate (see docs/GUIDED_CLI_LOGIN_FOR_OPERATORS.md).
      - nexa_vercel_cli_auth:/root/.vercel
      - nexa_gh_cli_auth:/root/.config/gh
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 45s
    # Used by `docker compose watch` (see run_everything.sh) — edit code on the host, containers update.
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: sync+restart
          path: ./scripts
          target: /app/scripts
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

  bot:
    container_name: nexa-bot
    build:
      context: .
      dockerfile: Dockerfile
    image: nexa:local
    restart: unless-stopped
    command: ["python", "-m", "app.bot.telegram_bot"]
    environment:
      DATABASE_URL: postgresql+psycopg2://overwhelm:overwhelm@db:5432/overwhelm
      API_BASE_URL: http://localhost:8010
      NEXA_OPERATOR_CLI_VERCEL_ABS: /usr/bin/vercel
      NEXA_OPERATOR_CLI_GH_ABS: /usr/bin/gh
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    # Shared task files & logs with API (dev executor is triggered from API)
    # Bind mount so `dev_job_*.md` / `*.done.md` edited on the host (Cursor) match paths the API/bot use.
    volumes:
      - ./.agent_tasks:/app/.agent_tasks
      - runtime_data:/app/.runtime
      # Same CLI auth persistence as api (shared named volumes).
      - nexa_vercel_cli_auth:/root/.vercel
      - nexa_gh_cli_auth:/root/.config/gh
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

volumes:
  pgdata:
  runtime_data:
  nexa_vercel_cli_auth:
  nexa_gh_cli_auth:
