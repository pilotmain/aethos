<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B21E5"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6B21E5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="#0F0F1A" rx="16"/>

  <circle cx="200" cy="200" r="250" fill="url(#glow)"/>
  <circle cx="1000" cy="200" r="200" fill="url(#glow)"/>

  <text x="600" y="118" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="56" font-weight="bold" fill="url(#grad)" filter="url(#shadow)">AETHOS</text>

  <text x="600" y="156" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" fill="#94A3B8" letter-spacing="3">THE AGENTIC OPERATING SYSTEM</text>

  <text x="600" y="192" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#CBD5E1">&#127756; The invisible layer that connects all autonomous agents &#127756;</text>

  <line x1="180" y1="218" x2="1020" y2="218" stroke="url(#grad)" stroke-width="1" stroke-dasharray="6,6"/>

  <g transform="translate(300, 228)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="#1A1A2E" stroke="#6B21E5" stroke-width="1.5"/>
    <text x="40" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#A855F7">&#129302; QA</text>

    <rect x="100" y="0" width="80" height="40" rx="20" fill="#1A1A2E" stroke="#06B6D4" stroke-width="1.5"/>
    <text x="140" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#06B6D4">&#128274; SEC</text>

    <rect x="200" y="0" width="80" height="40" rx="20" fill="#1A1A2E" stroke="#EC4899" stroke-width="1.5"/>
    <text x="240" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#EC4899">&#128081; CEO</text>

    <rect x="300" y="0" width="80" height="40" rx="20" fill="#1A1A2E" stroke="#10B981" stroke-width="1.5"/>
    <text x="340" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#10B981">&#128226; MKT</text>

    <rect x="400" y="0" width="80" height="40" rx="20" fill="#1A1A2E" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="440" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#F59E0B">&#129309; SUP</text>

    <rect x="500" y="0" width="80" height="40" rx="20" fill="#1A1A2E" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="540" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B5CF6">&#128203; SCR</text>
  </g>

  <rect x="300" y="302" width="600" height="52" rx="12" fill="#1A1A2E" stroke="#334155" stroke-width="1"/>
  <text x="600" y="334" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="13" fill="#22D3EE">curl -fsSL https://aethos.ai/install | bash</text>

  <circle cx="220" cy="88" r="6" fill="#A855F7">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="88" r="6" fill="#D946EF">
    <animate attributeName="opacity" values="1;0.45;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
