[importlinter]
root_package = app

; Channel adapters are often outside the grimp reachable graph unless explicitly imported.
; Channel isolation is enforced by tests/test_channel_routing.py + manual review.

[importlinter:plugins_do_not_import_providers]
name = Plugins must not import the provider bundle directly
type = forbidden
source_modules =
    app.plugins
forbidden_modules =
    app.services.providers

[importlinter:models_do_not_import_services]
name = Models must not import services
type = forbidden
source_modules =
    app.models
forbidden_modules =
    app.services
