[pytest]
pythonpath = .
markers =
    product_e2e: Product-wide smoke slice (gateway + API + plugins); run: pytest -m product_e2e
    product_e2e_browser: Optional Playwright check; requires RUN_BROWSER_E2E=1 and playwright installed
    soak: Longer bounded-runtime / restart loops; default suite uses compact iterations (set AETHOS_SOAK_LONG=1 for heavy)
