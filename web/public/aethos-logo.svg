<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B21E5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="80" fill="url(#primaryGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="60" fill="url(#primaryGradient)" opacity="0.2"/>
  <circle cx="100" cy="100" r="40" fill="url(#primaryGradient)" opacity="0.3"/>

  <text x="100" y="120" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="90" font-weight="bold" text-anchor="middle"
        fill="url(#primaryGradient)" filter="url(#glow)">A</text>

  <circle cx="100" cy="20" r="8" fill="#EC4899">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="50" r="6" fill="#D946EF">
    <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="140" r="7" fill="#A855F7">
    <animateTransform attributeName="transform" type="rotate" from="240 100 100" to="600 100 100" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="175" r="5" fill="#06B6D4">
    <animateTransform attributeName="transform" type="rotate" from="300 100 100" to="660 100 100" dur="8s" repeatCount="indefinite"/>
  </circle>

  <text x="230" y="85" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48" font-weight="bold" fill="url(#primaryGradient)" letter-spacing="2">AETHOS</text>
  <text x="235" y="115" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" fill="#8B5CF6" letter-spacing="4">THE AGENTIC OPERATING SYSTEM</text>

  <text x="235" y="145" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="11" fill="#94A3B8" font-style="italic">From Aether  The invisible layer that connects all autonomous agents</text>
</svg>
